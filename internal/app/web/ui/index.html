<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>singbox-wrapper</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="ui-loading">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-status-wrap">
        <div class="sidebar-brand" aria-hidden="true">
          <span id="sidebarRunIndicator" class="sidebar-run-indicator" aria-hidden="true"></span>
        </div>
        <div id="sidebarStatusLabel" class="sidebar-status-label">Status</div>
      </div>

      <nav class="sidebar-nav" aria-label="Main Navigation">
        <div class="sidebar-nav-item">
          <div class="sidebar-nav-text" id="navHomeText">Home</div>
          <button id="navHomeBtn" class="sidebar-nav-btn active" data-screen="home" type="button" aria-current="page">
            <span class="sidebar-nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" focusable="false">
                <path d="M3 10.6L12 3l9 7.6v9.4a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1v-9.4z" fill="currentColor"></path>
              </svg>
            </span>
          </button>
        </div>

        <div class="sidebar-nav-item">
          <div class="sidebar-nav-text" id="navProfilesText">Profiles</div>
          <button id="navProfilesBtn" class="sidebar-nav-btn" data-screen="profiles" type="button">
            <span class="sidebar-nav-icon" aria-hidden="true">
              <svg viewBox="0 -960 960 960" xmlns="http://www.w3.org/2000/svg" focusable="false">
                <path d="M80-160v-160h160v160H80Zm240 0v-160h560v160H320ZM80-400v-160h160v160H80Zm240 0v-160h560v160H320ZM80-640v-160h160v160H80Zm240 0v-160h560v160H320Z" fill="currentColor"></path>
              </svg>
            </span>
          </button>
        </div>

        <div class="sidebar-nav-item">
          <div class="sidebar-nav-text" id="navLogsText">Logs</div>
          <button id="navLogsBtn" class="sidebar-nav-btn" data-screen="logs" type="button">
            <span class="sidebar-nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" focusable="false">
                <path d="M6 3h9l3 3v15a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V3zm8 1.5V8h3.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                <path d="M9 12h6M9 16h6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
              </svg>
            </span>
          </button>
        </div>

        <div class="sidebar-nav-item">
          <div class="sidebar-nav-text" id="navSettingsText">Settings</div>
          <button id="navSettingsBtn" class="sidebar-nav-btn" data-screen="settings" type="button">
            <span class="sidebar-nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" focusable="false">
                <path d="M19.4 13.5a7.9 7.9 0 0 0 .1-1.5 7.9 7.9 0 0 0-.1-1.5l2-1.6-1.9-3.2-2.4 1a7.2 7.2 0 0 0-2.6-1.5L14.1 2h-4.2l-.4 3.2a7.2 7.2 0 0 0-2.6 1.5l-2.4-1-1.9 3.2 2 1.6a7.9 7.9 0 0 0-.1 1.5 7.9 7.9 0 0 0 .1 1.5l-2 1.6 1.9 3.2 2.4-1a7.2 7.2 0 0 0 2.6 1.5l.4 3.2h4.2l.4-3.2a7.2 7.2 0 0 0 2.6-1.5l2.4 1 1.9-3.2-2-1.6zM12 15.2a3.2 3.2 0 1 1 0-6.4 3.2 3.2 0 0 1 0 6.4z" fill="currentColor"></path>
              </svg>
            </span>
          </button>
        </div>
      </nav>

      <div class="sidebar-theme">
        <button class="control sidebar-theme-cycle" id="sidebarThemeCycle" type="button" aria-label="Theme mode">
          <svg id="sidebarThemeIcon" viewBox="0 -960 960 960" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
            <path d="M396-396q-32-32-58.5-67T289-537q-5 14-6.5 28.5T281-480q0 83 58 141t141 58q14 0 28.5-2t28.5-6q-39-22-74-48.5T396-396Zm57-56q51 51 114 87.5T702-308q-40 51-98 79.5T481-200q-117 0-198.5-81.5T201-480q0-65 28.5-123t79.5-98q20 72 56.5 135T453-452Zm290 72q-20-5-39.5-11T665-405q8-18 11.5-36.5T680-480q0-83-58.5-141.5T480-680q-20 0-38.5 3.5T405-665q-8-19-13.5-38T381-742q24-9 49-13.5t51-4.5q117 0 198.5 81.5T761-480q0 26-4.5 51T743-380ZM440-840v-120h80v120h-80Zm0 840v-120h80V0h-80Zm323-706-57-57 85-84 57 56-85 85ZM169-113l-57-56 85-85 57 57-85 84Zm671-327v-80h120v80H840ZM0-440v-80h120v80H0Zm791 328-85-85 57-57 84 85-56 57ZM197-706l-84-85 56-57 85 85-57 57Zm199 310Z" fill="currentColor"></path>
          </svg>
        </button>
      </div>
    </aside>

    <main class="content-area">
      <div class="content-frame">
        <section id="screenHome" class="screen active" data-screen="home">
          <div class="panel screen-panel">
            <div class="screen-header">
              <h1 id="homeTitle">Home</h1>
            </div>

            <div class="screen-grid home-grid">
              <article class="card">
                <h2 id="homeActionsTitle">Основные действия</h2>

                <div class="field-row">
                  <label class="field-label" id="labelUptime">Время работы:</label>
                  <div class="field-control">
                    <div id="uptime" class="uptime"></div>
                  </div>
                </div>

                <div class="field-row">
                  <label class="field-label" id="labelRunCheck" for="startStop">Запуск:</label>
                  <div class="field-control">
                    <button class="control" id="startStop" type="button">Старт</button>
                  </div>
                </div>

                <div class="field-row">
                <div id="status" class="status"></div>
              </article>

              <article class="card">
                <h2 id="homeProfileTitle">Профиль и селекторы</h2>
                <div class="field-row">
                  <label class="field-label" id="labelProfile" for="profilePicker">Профиль:</label>
                  <div class="field-control">
                    <div class="profile-picker-wrap" id="profileWrap">
                      <div class="profile-name-group">
                        <div class="control profile-value-box" id="profileValueBox">
                          <span id="profileValue" class="profile-value">-</span>
                        </div>
                        <button class="control profile-picker" id="profilePicker" type="button" aria-haspopup="listbox" aria-expanded="false">
                          <svg class="profile-arrow" stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="20" width="20" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
                            <path d="M6 9l6 6l6 -6"></path>
                          </svg>
                        </button>
                      </div>
                      <div id="profileMenu" class="profile-menu" role="listbox" hidden></div>
                    </div>
                  </div>
                </div>

                <div class="field-row" id="selectorBlock">
                  <label class="field-label" id="labelSelector">Селекторы:</label>
                  <div class="field-control selector-control">
                    <div id="selectorGroups" class="selector-groups"></div>
                  </div>
                </div>
              </article>
            </div>
          </div>
        </section>

        <section id="screenProfiles" class="screen" data-screen="profiles" hidden>
          <div class="panel screen-panel">
            <div class="screen-header">
              <h1 id="profilesTitle">Профили</h1>
            </div>

            <div class="screen-grid profiles-grid">
              <article class="card">
                <h2 id="profilesActionsTitle">Действия профиля</h2>

                <div class="field-row">
                  <label class="field-label" id="labelProfileActions">Управление:</label>
                  <div class="field-control">
                    <div class="profiles-toolbar">
                      <button class="control" id="newProfile" type="button">Новый</button>
                      <button class="control" id="deleteProfile" type="button">Удалить</button>
                      <button class="control" id="checkConfig" type="button">Проверить</button>
                      <button class="control" id="refreshConfig" type="button">Обновить</button>
                    </div>
                  </div>
                </div>

                <div class="field-row settings-autoupdate-row">
                  <label class="field-label" id="labelAutoUpdate" for="autoUpdateHours">Автообновление (часы):</label>
                  <div class="field-control settings-autoupdate-control">
                    <input class="control hours-input" id="autoUpdateHours" type="number" min="0" step="1" autocomplete="off">
                  </div>
                </div>

                <div class="field-row">
                  <label class="field-label" id="labelProfileList" for="profilePickerProfiles">Профиль:</label>
                  <div class="field-control">
                    <div class="profile-picker-wrap" id="profileWrapProfiles">
                      <div class="profile-name-group">
                        <div class="control profile-value-box" id="profileValueBoxProfiles">
                          <span id="profileValueProfiles" class="profile-value">-</span>
                        </div>
                        <button class="control profile-picker" id="profilePickerProfiles" type="button" aria-haspopup="listbox" aria-expanded="false">
                          <svg class="profile-arrow" stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="20" width="20" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
                            <path d="M6 9l6 6l6 -6"></path>
                          </svg>
                        </button>
                      </div>
                      <div id="profileMenuProfiles" class="profile-menu" role="listbox" hidden></div>
                    </div>
                  </div>
                </div>
              </article>

              <article class="card">
                <h2 id="profilesEditorTitle">Параметры профиля</h2>

                <div class="field-row">
                  <label class="field-label" id="labelProfileName" for="profileNameInput">Имя профиля:</label>
                  <div class="field-control">
                    <input class="control" id="profileNameInput" type="text" autocomplete="off">
                  </div>
                </div>

                <div class="field-row">
                  <label class="field-label" id="labelUrl" for="url">Ссылка:</label>
                  <div class="field-control">
                    <input class="control" id="url" type="text" autocomplete="off">
                  </div>
                </div>

                <div class="field-row">
                  <label class="field-label" id="labelVersion" for="version">Версия singbox:</label>
                  <div class="field-control">
                    <input class="control" id="version" type="text" autocomplete="off">
                  </div>
                </div>
              </article>
            </div>
          </div>
        </section>

        <section id="screenLogs" class="screen" data-screen="logs" hidden>
          <div class="panel screen-panel logs-panel">
            <div class="logs-header">
              <h1 id="logsTitle">Логи</h1>
              <div class="logs-actions">
                <input id="logsFilter" class="control logs-filter" type="text" spellcheck="false" autocomplete="off" inputmode="search" placeholder="Фильтр RegExp">
                <button class="control" id="clearLogs" type="button">Очистить</button>
                <button class="control" id="copyLogs" type="button">Копировать логи</button>
              </div>
            </div>
            <div id="logs" class="control"></div>
          </div>
        </section>

        <section id="screenSettings" class="screen" data-screen="settings" hidden>
          <div class="panel screen-panel">
            <div class="screen-header">
              <h1 id="settingsTitle">Настройки</h1>
            </div>

            <div class="screen-grid settings-grid">
              <article class="card">
                <h2 id="settingsGeneralTitle">Общие параметры</h2>

                <div class="field-row">
                  <label class="field-label" id="labelReleaseMenu" for="releaseMenuToggleArrow">Вер. приложения:</label>
                  <div class="field-control">
                    <div id="releaseMenuWrap" class="release-menu-wrap">
                      <div class="release-menu-controls">
                        <div class="control release-menu-toggle" id="releaseMenuToggle">
                          <span id="releaseMenuLabel" class="release-menu-label">Release</span>
                        </div>
                        <button class="control profile-picker release-menu-toggle-arrow" id="releaseMenuToggleArrow" type="button" aria-haspopup="menu" aria-expanded="false">
                          <svg class="profile-arrow release-menu-arrow" stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="20" width="20" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
                            <path d="M6 9l6 6l6 -6"></path>
                          </svg>
                        </button>
                      </div>

                      <div id="releaseMenu" class="release-menu" role="menu" hidden>
                        <div class="release-menu-item release-menu-item-info" role="none">
                          <span id="releaseCurrentCaption" class="release-menu-caption">Текущая версия</span>
                          <a id="releaseCurrentLink" class="release-menu-value release-menu-link" href="#" target="_blank" rel="noopener noreferrer" role="menuitem">-</a>
                        </div>
                        <div id="releaseLatestRow" class="release-menu-item release-menu-item-info" role="none" hidden>
                          <span id="releaseLatestCaption" class="release-menu-caption">Новая версия</span>
                          <a id="releaseLatestLink" class="release-menu-value release-menu-link" href="#" target="_blank" rel="noopener noreferrer" role="menuitem">-</a>
                        </div>
                        <button id="updateAppBtn" class="release-menu-item release-menu-action" type="button" role="menuitem" hidden>Обновить приложение</button>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="field-row">
                  <label class="field-label" id="labelLanguage" for="langRu">Язык:</label>
                  <div class="field-control">
                    <div class="lang-switch">
                      <button class="control lang-btn" id="langRu" type="button">RU</button>
                      <button class="control lang-btn" id="langEn" type="button">EN</button>
                    </div>
                  </div>
                </div>

                <div class="field-row startup-row">
                  <label class="field-label startup-row-label" id="labelAutoStartCore" for="autoStartCore">Auto start core</label>
                  <div class="field-control startup-row-control">
                    <label class="startup-toggle" for="autoStartCore">
                      <input id="autoStartCore" class="startup-toggle-input" type="checkbox">
                      <span class="startup-toggle-ui" aria-hidden="true"></span>
                    </label>
                  </div>
                </div>

                <div class="field-row startup-row">
                  <label class="field-label startup-row-label" id="labelStartMinimizedTray" for="startMinimizedTray">Start in tray</label>
                  <div class="field-control startup-row-control">
                    <label class="startup-toggle" for="startMinimizedTray">
                      <input id="startMinimizedTray" class="startup-toggle-input" type="checkbox">
                      <span class="startup-toggle-ui" aria-hidden="true"></span>
                    </label>
                  </div>
                </div>

                <div class="field-row startup-row">
                  <label class="field-label startup-row-label" id="labelInsecureToggle" for="allowInsecure">Разрешить небезопасные ссылки</label>
                  <div class="field-control startup-row-control">
                    <label class="startup-toggle" for="allowInsecure">
                      <input id="allowInsecure" class="startup-toggle-input" type="checkbox">
                      <span class="startup-toggle-ui" aria-hidden="true"></span>
                    </label>
                  </div>
                </div>

              </article>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div id="confirmModal" class="confirm-modal" hidden>
    <div id="confirmModalOverlay" class="confirm-modal-overlay"></div>
    <div class="confirm-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmMessage">
      <div class="confirm-modal-header">
        <h3 id="confirmTitle">Подтверждение</h3>
      </div>
      <div id="confirmMessage" class="confirm-modal-message"></div>
      <div class="confirm-modal-actions">
        <button class="control" id="confirmCancel" type="button">Отмена</button>
        <button class="control danger" id="confirmOk" type="button">Удалить</button>
      </div>
    </div>
  </div>

  <div id="toastStack" class="toast-stack" aria-live="polite" aria-atomic="false"></div>

  <script src="/app.js"></script>
</body>
</html>
